version: '3.8'

services:
  crm-classifier:
    build: .
    container_name: crm_classifier_app
    env_file:
      - .env
    volumes:
      # Mount local data and output directories to persist history, backups, and logs
      - ./data:/app/data
      - ./output:/app/output
      # Mount Service Account GCP credentials key (if using Vertex AI)
      - ./sa-key.json:/app/sa-key.json
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - RUN_AS_DAEMON=true
    restart: unless-stopped
